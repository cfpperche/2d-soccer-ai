<!DOCTYPE html>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23fff' stroke='%23222' stroke-width='2'/%3E%3Cpolygon points='16,8 22,12 20,19 12,19 10,12' fill='%23222'/%3E%3C/svg%3E">
<style>
  html, body { margin:0; padding:0; background:#0a0a0a; color:#ddd; font-family: -apple-system, system-ui, sans-serif; overflow-x:hidden; }
  body { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:20px; box-sizing:border-box;
         background: radial-gradient(ellipse at top, #1a1a1a, #050505 70%); }
  h1 { font-size:14px; font-weight:500; opacity:.55; margin:0; letter-spacing:1px; text-transform:uppercase; }
  canvas { background:#0a5d2a; border-radius:14px; box-shadow: 0 18px 80px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,0.04); display:block; max-width:100%; height:auto; }
  .legend { font-size:12px; opacity:.45; }
  kbd { background:#1a1a1a; padding:2px 6px; border-radius:4px; border:1px solid #2a2a2a; font-family:inherit; font-size:11px; }
  .credit { font-size:10px; opacity:.3; margin-top:4px; }
  .lang-switcher { position:fixed; top:14px; right:14px; display:flex; gap:2px;
                   background:rgba(0,0,0,0.55); padding:3px; border-radius:7px;

  .lang-switcher button { background:transparent; border:none; cursor:pointer;
                          color:rgba(255,255,255,0.45); font:600 11px/1 system-ui,sans-serif;

                          transition:background .12s, color .12s; }
  .lang-switcher button:hover { color:rgba(255,255,255,0.9); }
  .lang-switcher button.active { background:rgba(255,255,255,0.14); color:#fff; }
</style>
</head>
<body>
<div class="lang-switcher" role="group" aria-label="Language">
  <button type="button" data-lang="en">EN</button>
  <button type="button" data-lang="pt">PT</button>
</div>
<h1>2D Soccer — AI vs AI · self-play</h1>
<canvas id="c" width="1280" height="780"></canvas>
<div class="legend"><kbd>space</kbd> pause · <kbd>R</kbd> restart · <kbd>+</kbd>/<kbd>-</kbd> speed · <kbd>M</kbd> mute · <kbd>P</kbd> manual replay</div>
<div class="credit">click or press a key once to enable audio</div>

<script>
"use strict";

// === i18n ===
// Auto-detects browser locale; ?lang=en or ?lang=pt overrides.
const LANG_DICT = {
  en: {
    docTitle: 'Soccer 2D — AI vs AI',
    h1: '2D Soccer — AI vs AI · self-play',
    legend: '<kbd>space</kbd> pause · <kbd>R</kbd> restart · <kbd>+</kbd>/<kbd>-</kbd> speed · <kbd>M</kbd> mute · <kbd>P</kbd> manual replay',
    credit: 'click or press a key once to enable audio',
    teamA_name: 'REDS',  teamA_short: 'RED',
    teamB_name: 'BLUES', teamB_short: 'BLU',
    goal: (name) => `GOOOAL — ${name}!`,
    shotToast: 'SHOT!',
    longBall:  'LONG BALL!',
    foul:    'FOUL!',
    penalty: 'PENALTY!',
    save:     'SAVE!',
    goalKick: 'GOAL KICK!',
    replayLabel:   'REPLAY · space to skip',
    replayOverlay: 'REPLAY · SLOW MOTION',
    paused:   'PAUSED',
    fulltime: 'FULL TIME',
    possLeft:  (pct) => `POSS ${pct}%`,
    possRight: (pct) => `${pct}% POSS`,
    shots:     (a, b) => `SHOTS  ${a} — ${b}`,
  },
  pt: {
    docTitle: 'Soccer 2D — IA vs IA',
    h1: '2D Soccer — IA vs IA · self-play',
    legend: '<kbd>espaço</kbd> pausa · <kbd>R</kbd> reinicia · <kbd>+</kbd>/<kbd>-</kbd> velocidade · <kbd>M</kbd> mute · <kbd>P</kbd> replay manual',
    credit: 'clique ou tecle uma vez para ativar o áudio',
    teamA_name: 'RUBRO', teamA_short: 'RUB',
    teamB_name: 'AZUL',  teamB_short: 'AZU',
    goal: (name) => `GOOOL — ${name}!`,
    shotToast: 'CHUTOU!',
    longBall:  'LANÇAMENTO!',
    foul:    'FALTA!',
    penalty: 'PÊNALTI!',
    save:     'DEFESA!',
    goalKick: 'TIRO DE META!',
    replayLabel:   'REPLAY · espaço pula',
    replayOverlay: 'REPLAY · CÂMERA LENTA',
    paused:   'PAUSADO',
    fulltime: 'FIM DE JOGO',
    possLeft:  (pct) => `POSSE ${pct}%`,
    possRight: (pct) => `${pct}% POSSE`,
    shots:     (a, b) => `CHUTES  ${a} — ${b}`,
  },
};
function detectLang() {
  const q = new URLSearchParams(location.search).get('lang');
  if (q === 'pt' || q === 'en') return q;
  const nav = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  return nav.startsWith('pt') ? 'pt' : 'en';
}
const LANG = detectLang();
const T = LANG_DICT[LANG];

// apply HTML-side strings
document.title = T.docTitle;
document.documentElement.lang = LANG;
const _h1 = document.querySelector('h1'); if (_h1) _h1.textContent = T.h1;
const _lg = document.querySelector('.legend'); if (_lg) _lg.innerHTML = T.legend;
const _cr = document.querySelector('.credit'); if (_cr) _cr.textContent = T.credit;

// language switcher buttons
document.querySelectorAll('.lang-switcher button').forEach((btn) => {
  if (btn.dataset.lang === LANG) btn.classList.add('active');
  btn.addEventListener('click', () => {
    if (btn.dataset.lang === LANG) return;
    const u = new URL(location.href);
    u.searchParams.set('lang', btn.dataset.lang);
    location.href = u.toString();
  });
});

const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;

// === Layout ===
const STAND_PAD = 70;                     // crowd stand thickness around field
const FIELD = { x: STAND_PAD, y: STAND_PAD, w: W - STAND_PAD*2, h: H - STAND_PAD*2 };
const GOAL_H = 150;
const GOAL_TOP = H/2 - GOAL_H/2;
const GOAL_BOT = H/2 + GOAL_H/2;
const GOAL_X_L = FIELD.x;
const GOAL_X_R = FIELD.x + FIELD.w;

// FIFA Law 4: GK kit must be distinguishable from outfield + officials.
// Outfield reds/blues, ref yellow → GK gets lime / orange to keep all 4 distinct.
const TEAM_A = { id:'A', name: T.teamA_name, short: T.teamA_short, color:'#e23636', gkColor:'#7eff5e', dark:'#7a1414', dir: 1 };
const TEAM_B = { id:'B', name: T.teamB_name, short: T.teamB_short, color:'#3578e2', gkColor:'#ff8c2e', dark:'#163e7a', dir:-1 };

const FORMATION = [
  ['GK',  0.04, 0.50],
  ['DEF', 0.20, 0.18], ['DEF', 0.22, 0.40], ['DEF', 0.22, 0.60], ['DEF', 0.20, 0.82],
  ['MID', 0.42, 0.28], ['MID', 0.40, 0.50], ['MID', 0.42, 0.72],
  ['FWD', 0.66, 0.22], ['FWD', 0.68, 0.50], ['FWD', 0.66, 0.78],
];
const SPEED = { GK: 1.9, DEF: 2.3, MID: 2.5, FWD: 2.7 };
const ACCEL = 0.14; // inertia: 1 = instant, lower = smoother turns

const NAMES = [
  'SILVA','COSTA','SOUZA','PEREIRA','ALMEIDA','LIMA','GOMES','RIBEIRO','CARVALHO','FERREIRA','MARTINS',
  'ROCHA','FERNANDES','TORRES','VARGAS','NUNES','MENDES','CASTRO','OLIVEIRA','CARDOSO','BARBOSA','MOURA',
  'ARAÚJO','MELO','PINTO','TAVARES','MORAIS','REZENDE','BORGES','XAVIER'
];

class Player {
  constructor(team, role, hx, hy, num, name) {
    this.team = team;
    this.role = role;
    this.homeX = hx; this.homeY = hy;
    this.x = hx; this.y = hy;
    this.vx = 0; this.vy = 0;
    this.num = num;
    this.name = name;
    this.speed = SPEED[role];
    this.kickCD = 0;
    this.squash = 0;       // visual feedback when colliding ball
    this.phaseOff = Math.random() * Math.PI * 2;       // walk-cycle offset
    this.facing = team.dir > 0 ? 0 : Math.PI;          // last known facing (radians, 0=east)
  }
}

let teamA, teamB, ball, scoreA, scoreB, timeLeft, kickoffTeam;
let paused = false, celebrating = null, speedMul = 0.1, muted = false;
const SPEED_DEFAULT = 0.1;
let lastGoalAt = -Infinity; // ms timestamp, hard cooldown to prevent runaway scoring
let totalTime = 0;          // seconds elapsed, drives walk-cycle animation
let ds = 1;                 // frame scale: 1.0 == standard 60fps step. Set inside update().
// stats
let possessionA = 0, possessionB = 0, shotsA = 0, shotsB = 0;
// effects
let shake = { t: 0, amp: 0 };
const particles = [];
const ballTrail = []; // {x,y,t}
let toast = null;     // {text, color, t, max}
// replay — temporarily disabled (user reported it confused the score
// readout, will revisit). The buffer keeps recording so we can flip
// REPLAYS_ENABLED back on without losing the feature.
const REPLAYS_ENABLED = false;
const REPLAY_BUF_LEN = 180; // 3 seconds @60fps
const replayBuf = [];
let replay = null;          // {frames, idx, slowFactor}
// referee + set pieces
// Ref kit: modern FIFA-style yellow shirt, dark shorts.
const REF_TEAM = { id:'R', name:'REF', short:'REF', color:'#f4c116', dark:'#5a4708', dir:0 };
const referee = { x: 0, y: 0, vx: 0, vy: 0, facing: 0, alarm: 0, phaseOff: 0 };
let whistle = null;         // {type:'foul'|'penalty', team, x, y, t}
const PENALTY_BOX_W = 150;
const PENALTY_BOX_H = 290;
const PENALTY_SPOT  = 105;
const FOUL_REL_SPEED    = 3.5;  // velocity diff threshold (px/standard-frame) to consider a foul
const FOUL_PROBABILITY  = 0.4;  // fraction of qualifying contacts the ref actually whistles
const FOUL_VIC_MAX_DIST = 22;   // victim must be on/very near the ball
const FOUL_DIST_GAP     = 12;   // aggressor must be clearly behind (not 50/50)
const FOUL_DOT_MIN      = 1.0;  // aggressor's velocity must point at the victim
const FOUL_COOLDOWN_MS  = 2500; // re-arm time after a whistle
let lastFoulAt = -Infinity;     // ms cooldown so the same skirmish doesn't fire twice
// audio
let audioCtx = null;
let crowdGain = null;

// === RNG / utils ===
const dist = (ax,ay,bx,by) => Math.hypot(ax-bx, ay-by);
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const lerp  = (a,b,t) => a + (b-a)*t;
const rand  = (a, b) => a + Math.random() * (b - a);
const pick  = (arr) => arr[Math.floor(Math.random()*arr.length)];

function shuffled(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function lighten(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  const r = clamp((n >> 16) + amt, 0, 255);
  const g = clamp(((n >> 8) & 0xff) + amt, 0, 255);
  const b = clamp((n & 0xff) + amt, 0, 255);
  return `rgb(${r},${g},${b})`;
}

// === Audio (procedural, lazy-init on first user gesture) ===
function ensureAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    startCrowdAmbient();
  } catch (e) { audioCtx = null; }
}

function startCrowdAmbient() {
  if (!audioCtx) return;
  const dur = 30;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  // pink-ish noise
  let lastOut = 0;
  for (let i = 0; i < data.length; i++) {
    const w = Math.random() * 2 - 1;
    lastOut = (lastOut + 0.02 * w) / 1.02;
    data[i] = lastOut * 3.5;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf; src.loop = true;
  const flt = audioCtx.createBiquadFilter();
  flt.type = 'lowpass'; flt.frequency.value = 700;
  crowdGain = audioCtx.createGain(); crowdGain.gain.value = 0.06;
  src.connect(flt).connect(crowdGain).connect(audioCtx.destination);
  src.start();
}
function setMuted(m) {
  muted = m;
  if (crowdGain) crowdGain.gain.value = m ? 0 : 0.06;
}
function sfx(type) {
  if (!audioCtx || muted) return;
  const t = audioCtx.currentTime;
  if (type === 'kick') {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(220, t);
    o.frequency.exponentialRampToValueAtTime(70, t + 0.08);
    g.gain.setValueAtTime(0.18, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    o.connect(g).connect(audioCtx.destination); o.start(t); o.stop(t + 0.12);
  } else if (type === 'shot') {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(160, t);
    o.frequency.exponentialRampToValueAtTime(50, t + 0.15);
    g.gain.setValueAtTime(0.25, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    o.connect(g).connect(audioCtx.destination); o.start(t); o.stop(t + 0.2);
  } else if (type === 'whistle') {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(2200, t);
    o.frequency.linearRampToValueAtTime(2400, t + 0.1);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.18, t + 0.02);
    g.gain.linearRampToValueAtTime(0, t + 0.35);
    o.connect(g).connect(audioCtx.destination); o.start(t); o.stop(t + 0.4);
  } else if (type === 'cheer') {
    const dur = 2.8;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * 0.7;
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const flt = audioCtx.createBiquadFilter();
    flt.type = 'bandpass'; flt.frequency.value = 1000; flt.Q.value = 0.6;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.5, t + 0.15);
    g.gain.linearRampToValueAtTime(0.3, t + 1.6);
    g.gain.linearRampToValueAtTime(0, t + dur);
    src.connect(flt).connect(g).connect(audioCtx.destination);
    src.start(t); src.stop(t + dur);
  }
}

// === Setup ===
function buildTeam(team, names) {
  return FORMATION.map(([role, fx, fy], i) => {
    const x = team === TEAM_A
      ? FIELD.x + fx * FIELD.w
      : FIELD.x + (1-fx) * FIELD.w;
    const y = FIELD.y + fy * FIELD.h;
    return new Player(team, role, x, y, i+1, names[i]);
  });
}

function reset() {
  const allNames = shuffled(NAMES);
  teamA = buildTeam(TEAM_A, allNames.slice(0, 11));
  teamB = buildTeam(TEAM_B, allNames.slice(11, 22));
  ball = { x: W/2, y: H/2, vx: 0, vy: 0 };
  scoreA = 0; scoreB = 0;
  timeLeft = 5 * 60;
  kickoffTeam = TEAM_A;
  paused = false; celebrating = null;
  possessionA = 0; possessionB = 0; shotsA = 0; shotsB = 0;
  particles.length = 0; ballTrail.length = 0; replayBuf.length = 0;
  replay = null; toast = null;
  shake.t = 0;
  totalTime = 0;
  lastGoalAt = -Infinity;
  whistle = null;
  lastFoulAt = -Infinity;
  referee.x = W/2 + 80; referee.y = H/2 - 60;
  referee.vx = 0; referee.vy = 0; referee.facing = 0;
  referee.alarm = 0;
  referee.phaseOff = Math.random() * Math.PI * 2;
  resetPositions();
  buildStandsCache();
  sfx('whistle');
}

function resetPositions() {
  ball.x = W/2; ball.y = H/2; ball.vx = 0; ball.vy = 0;
  for (const p of [...teamA, ...teamB]) {
    p.x = p.homeX; p.y = p.homeY; p.vx = 0; p.vy = 0; p.kickCD = 0; p.squash = 0;
  }
}

// === AI ===
function moveToward(p, tx, ty, mul=1) {
  const dx = tx - p.x, dy = ty - p.y;
  const d = Math.hypot(dx, dy);
  let targetVx, targetVy;
  if (d < 1.5) {
    targetVx = 0; targetVy = 0;
  } else {
    // ease in as we approach the target so players don't overshoot
    const arrive = d < 30 ? d / 30 : 1;
    targetVx = dx / d * p.speed * mul * arrive;
    targetVy = dy / d * p.speed * mul * arrive;
  }
  // inertia — blend current velocity toward target. Scale by ds so the
  // convergence rate per game-second is constant across speedMul values.
  p.vx += (targetVx - p.vx) * ACCEL * ds;
  p.vy += (targetVy - p.vy) * ACCEL * ds;
}

function findClosestToBall(team, includeGK=false) {
  let best = null, bd = Infinity;
  for (const p of team) {
    if (!includeGK && p.role === 'GK') continue;
    const d = dist(p.x, p.y, ball.x, ball.y);
    if (d < bd) { bd = d; best = p; }
  }
  return { p: best, d: bd };
}

function laneClear(fromX, fromY, toX, toY, enemies, threshold=26) {
  const dx = toX - fromX, dy = toY - fromY;
  const len2 = dx*dx + dy*dy;
  if (len2 < 1) return true;
  for (const e of enemies) {
    const t = clamp(((e.x - fromX) * dx + (e.y - fromY) * dy) / len2, 0, 1);
    const px = fromX + t * dx, py = fromY + t * dy;
    if (Math.hypot(e.x - px, e.y - py) < threshold) return false;
  }
  return true;
}

function decideKick(p) {
  const dir = p.team.dir;
  const goalX = dir > 0 ? GOAL_X_R : GOAL_X_L;
  const team    = p.team === TEAM_A ? teamA : teamB;
  const enemies = p.team === TEAM_A ? teamB : teamA;

  const distGoalX = Math.abs(p.x - goalX);
  const inShootingRange = distGoalX < 340 && Math.abs(p.y - H/2) < 260;

  if (inShootingRange) {
    const targetY = H/2 + (Math.random() - 0.5) * (GOAL_H - 30);
    if (laneClear(p.x, p.y, goalX, targetY, enemies, 22)) {
      kickBall(p, goalX, targetY, 16, true);
      if (p.team === TEAM_A) shotsA++; else shotsB++;
      sfx('shot');
      if (Math.random() < 0.35) showToast(T.shotToast, p.team.color, 0.9);
      return;
    }
  }

  // GKs hoof it forward — wider pass-distance window and harder kicks.
  const isKeeper = p.role === 'GK';
  const minPass = isKeeper ? 100 : 70;
  const maxPass = isKeeper ? 720 : 430;

  let best = null, bestScore = -Infinity;
  for (const t of team) {
    if (t === p || t.role === 'GK') continue;
    const d = dist(p.x, p.y, t.x, t.y);
    if (d < minPass || d > maxPass) continue;
    const forwardness = (t.x - p.x) * dir;
    if (forwardness < -40) continue;
    if (!laneClear(p.x, p.y, t.x, t.y, enemies)) continue;
    const goalProgress = (goalX - t.x) * -dir;
    const score = forwardness * 1.5 - d * 0.05 - goalProgress * 0.2;
    if (score > bestScore) { bestScore = score; best = t; }
  }
  if (best) {
    const d = dist(p.x, p.y, best.x, best.y);
    const power = clamp(d / 28 + 2, 6, isKeeper ? 17 : 13);
    kickBall(p, best.x + best.vx * 4, best.y + best.vy * 4, power, false);
    sfx('kick');
    if (d > 280 && Math.random() < 0.3) showToast(T.longBall, p.team.color, 0.9);
    return;
  }

  const dribX = p.x + dir * 90;
  const dribY = p.y + (H/2 - p.y) * 0.15;
  kickBall(p, dribX, dribY, 5, false);
  sfx('kick');
}

function kickBall(p, tx, ty, power, hard) {
  const dx = tx - p.x, dy = ty - p.y;
  const d = Math.hypot(dx, dy) || 1;
  ball.vx = dx / d * power;
  ball.vy = dy / d * power;
  p.squash = 1;
  // kick-burst particles
  spawnKickBurst(ball.x, ball.y, dx/d, dy/d, hard ? 12 : 6, hard ? '#ffe44d' : '#fff');
  if (hard) shakeAdd(2.5, 0.15);
}

function updateTeam(team) {
  const other = team === teamA ? teamB : teamA;
  const ours = findClosestToBall(team);
  const theirs = findClosestToBall(other);
  const possession = ours.d < theirs.d - 4;
  const dir = team[0].team.dir;

  const bias = (possession ? 70 : -50) * dir;
  const ballYBias = (ball.y - H/2) * 0.35;
  const ballXBias = (ball.x - W/2) * 0.15;

  for (const p of team) {
    if (p === ours.p) {
      moveToward(p, ball.x, ball.y, 1.05);
    } else if (p.role === 'GK') {
      const gx = team === teamA ? FIELD.x + 30 : FIELD.x + FIELD.w - 30;
      // Predict where the ball will be when it crosses the GK's x-line
      // and aim there instead of the ball's current y. This lets the
      // keeper actually intercept angled shots.
      let targetY = ball.y;
      const ballSpeedX = Math.abs(ball.vx);
      const towardOwnGoal = ball.vx * dir < -1;
      if (towardOwnGoal && ballSpeedX > 0.5) {
        const framesToReach = Math.abs((gx + 30 * dir) - ball.x) / ballSpeedX;
        targetY = ball.y + ball.vy * framesToReach;
      }
      const gy = clamp(targetY, GOAL_TOP + 18, GOAL_BOT - 18);
      const ballNearGoal = (team === teamA ? ball.x < FIELD.x + 220 : ball.x > FIELD.x + FIELD.w - 220);
      const adv = ballNearGoal ? 30 * dir : 0;
      moveToward(p, gx + adv, gy, 1.3); // slight speed bump for the GK
    } else {
      let tx = p.homeX + bias + ballXBias * 0.5;
      let ty = p.homeY + ballYBias;
      if (!possession && p.role !== 'FWD') {
        const dToBall = dist(p.x, p.y, ball.x, ball.y);
        if (dToBall < 260) {
          // smooth press: blend home position toward ball as player gets closer
          const press = clamp(1 - dToBall / 260, 0, 1) * 0.55;
          tx = tx * (1 - press) + ball.x * press;
          ty = ty * (1 - press) + ball.y * press;
        }
      }
      tx = clamp(tx, FIELD.x + 20, FIELD.x + FIELD.w - 20);
      ty = clamp(ty, FIELD.y + 20, FIELD.y + FIELD.h - 20);
      moveToward(p, tx, ty);
    }
  }
}

function resolvePlayerCollisions(all) {
  for (let i = 0; i < all.length; i++) {
    for (let j = i+1; j < all.length; j++) {
      const a = all[i], b = all[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.hypot(dx, dy);
      const minD = 26;
      if (d > 0 && d < minD) {
        const push = (minD - d) / 2;
        const ux = dx / d, uy = dy / d;
        a.x -= ux * push; a.y -= uy * push;
        b.x += ux * push; b.y += uy * push;
        checkFoul(a, b);
      }
    }
  }
}

// Foul detection — requires a real tackle profile, not a 50/50 ball
// contest. Goals:
//   - one player is clearly the "ball handler" (close to ball)
//   - the other is clearly the "challenger" (further from ball)
//   - challenger is moving fast TOWARD the handler
//   - and that movement carries serious relative velocity
// Kickoff-style head-on chases (both equally far from ball) are
// rejected because neither is the handler yet.
function checkFoul(a, b) {
  if (a.team === b.team) return;
  if (whistle || celebrating || replay) return;
  if (performance.now() - lastFoulAt < FOUL_COOLDOWN_MS) return;

  const relVx = a.vx - b.vx, relVy = a.vy - b.vy;
  const relSpeed = Math.hypot(relVx, relVy);
  if (relSpeed < FOUL_REL_SPEED) return;

  const dA = dist(a.x, a.y, ball.x, ball.y);
  const dB = dist(b.x, b.y, ball.x, ball.y);
  const victim    = dA < dB ? a : b;        // closer to ball = ball-handler
  const aggressor = dA < dB ? b : a;        // further from ball = challenger
  const vicDist   = Math.min(dA, dB);
  const aggDist   = Math.max(dA, dB);

  // The handler must be effectively on the ball — otherwise it's not a
  // protected play, just two people running toward a loose ball.
  if (vicDist > FOUL_VIC_MAX_DIST) return;
  // The challenger must be clearly behind, not contesting from the same spot.
  if (aggDist - vicDist < FOUL_DIST_GAP) return;
  // Challenger's velocity must aim at the handler (real tackles charge in).
  const dirX = victim.x - aggressor.x, dirY = victim.y - aggressor.y;
  const len = Math.hypot(dirX, dirY) || 1;
  const dot = (aggressor.vx * dirX + aggressor.vy * dirY) / len;
  if (dot < FOUL_DOT_MIN) return;

  if (Math.random() > FOUL_PROBABILITY) return;
  triggerFoul(aggressor, victim);
}

function triggerFoul(aggressor, victim) {
  lastFoulAt = performance.now();
  const offendingTeam = aggressor.team;
  const offendedTeam  = victim.team;
  // Foul spot is roughly where the contact happened
  const fx = (aggressor.x + victim.x) / 2;
  const fy = (aggressor.y + victim.y) / 2;

  // Inside offending team's own penalty box → penalty
  const inOwnBox = (offendingTeam === TEAM_A)
    ? (fx < FIELD.x + PENALTY_BOX_W && Math.abs(fy - H/2) < PENALTY_BOX_H/2)
    : (fx > FIELD.x + FIELD.w - PENALTY_BOX_W && Math.abs(fy - H/2) < PENALTY_BOX_H/2);

  if (inOwnBox) {
    const dir = offendedTeam.dir;
    const spotX = dir > 0 ? FIELD.x + FIELD.w - PENALTY_SPOT : FIELD.x + PENALTY_SPOT;
    whistle = { type: 'penalty', team: offendedTeam, x: spotX, y: H/2, t: 1.6 };
    showToast(T.penalty, '#ffd84d', 1.8);
    shakeAdd(8, 0.3);
  } else {
    whistle = { type: 'foul', team: offendedTeam, x: fx, y: fy, t: 1.0 };
    showToast(T.foul, '#ffe44d', 1.3);
    shakeAdd(4, 0.2);
  }
  sfx('whistle');
  referee.alarm = 1.4;
  // freeze the world: zero velocities so nothing keeps moving during the freeze
  ball.vx = 0; ball.vy = 0;
  for (const p of [...teamA, ...teamB]) {
    p.vx = 0; p.vy = 0;
    p.kickCD = 0.6;
  }
}

// Save → triggers a goal-kick set piece (Law 16).
function triggerSave(gk) {
  const dir = gk.team.dir;
  // Place the ball at the corner of the small box on the side the shot came from.
  const spotX = dir > 0 ? FIELD.x + 50 : FIELD.x + FIELD.w - 50;
  const spotY = H/2 + (ball.y > H/2 ? 50 : -50);
  whistle = { type: 'goalkick', team: gk.team, x: spotX, y: spotY, t: 1.4 };
  showToast(T.save, '#ffe44d', 1.4);
  sfx('whistle');
  referee.alarm = 1.0;
  ball.vx = 0; ball.vy = 0;
  for (const p of [...teamA, ...teamB]) {
    p.vx = 0; p.vy = 0;
    p.kickCD = 0.5;
  }
}

// Reposition ball + players for the set piece, then resume normal play.
function executeSetPiece() {
  if (!whistle) return;
  ball.x = whistle.x; ball.y = whistle.y; ball.vx = 0; ball.vy = 0;
  const isPK = whistle.type === 'penalty';
  const isGK = whistle.type === 'goalkick';
  const dir = whistle.team.dir;

  if (isGK) {
    // Goal kick: clear the kicking team's penalty box of opponents
    // (Law 16 — opposing players outside the penalty area until the
    // ball is in play). Defending box is on the -dir side.
    const boxEdgeX = dir > 0 ? FIELD.x + PENALTY_BOX_W + 10
                             : FIELD.x + FIELD.w - PENALTY_BOX_W - 10;
    for (const p of [...teamA, ...teamB]) {
      if (p.team === whistle.team) continue;
      const insideBox = dir > 0 ? p.x < boxEdgeX : p.x > boxEdgeX;
      if (insideBox && Math.abs(p.y - H/2) < PENALTY_BOX_H/2 + 10) p.x = boxEdgeX;
    }
    // Pin the GK right next to the ball, ready to kick it forward.
    const team = whistle.team === TEAM_A ? teamA : teamB;
    const gk = team.find(p => p.role === 'GK');
    if (gk) {
      gk.x = ball.x - dir * 16;
      gk.y = ball.y;
      gk.kickCD = 0.25; // brief delay so the kick reads as deliberate
    }
    showToast(T.goalKick, '#ffe44d', 1.2);
    whistle = null;
    return;
  }

  // Foul / penalty: push opposing team away from the ball
  for (const p of [...teamA, ...teamB]) {
    if (p.team === whistle.team) continue;
    if (p.role === 'GK') continue;
    if (isPK) {
      // outside the penalty box
      const boxEdge = dir > 0 ? FIELD.x + FIELD.w - PENALTY_BOX_W - 10
                              : FIELD.x + PENALTY_BOX_W + 10;
      const insideBox = dir > 0 ? p.x > boxEdge : p.x < boxEdge;
      if (insideBox && Math.abs(p.y - H/2) < PENALTY_BOX_H/2 + 10) p.x = boxEdge;
    } else {
      const d = dist(p.x, p.y, ball.x, ball.y);
      if (d < 80) {
        const dx = p.x - ball.x, dy = p.y - ball.y;
        const nrm = Math.hypot(dx, dy) || 1;
        p.x = ball.x + (dx / nrm) * 80;
        p.y = ball.y + (dy / nrm) * 80;
      }
    }
  }

  if (isPK) {
    // Push attacking team's outfield outside the box too, leave a single taker by the spot
    const team = whistle.team === TEAM_A ? teamA : teamB;
    let taker = null, takerD = Infinity;
    for (const p of team) {
      if (p.role === 'GK') continue;
      const d = dist(p.x, p.y, ball.x, ball.y);
      if (d < takerD) { takerD = d; taker = p; }
    }
    for (const p of team) {
      if (p === taker || p.role === 'GK') continue;
      const boxEdge = dir > 0 ? FIELD.x + FIELD.w - PENALTY_BOX_W - 30
                              : FIELD.x + PENALTY_BOX_W + 30;
      const insideBox = dir > 0 ? p.x > boxEdge : p.x < boxEdge;
      if (insideBox && Math.abs(p.y - H/2) < PENALTY_BOX_H/2 + 30) p.x = boxEdge;
    }
    if (taker) { taker.x = ball.x - dir * 22; taker.y = ball.y; }
  }

  whistle = null;
}

function update(dt) {
  totalTime += dt;
  // ds = "frame scale". 1.0 means a standard 60fps frame's worth of motion.
  // Scaling all per-frame accumulators by ds makes physics proportional to
  // game-time elapsed, so the world genuinely runs slower at low speedMul
  // (instead of just the clock).
  ds = dt * 60;

  updateTeam(teamA);
  updateTeam(teamB);

  for (const p of [...teamA, ...teamB]) {
    p.x += p.vx * ds; p.y += p.vy * ds;
    p.x = clamp(p.x, FIELD.x + 8, FIELD.x + FIELD.w - 8);
    p.y = clamp(p.y, FIELD.y + 8, FIELD.y + FIELD.h - 8);
    if (p.kickCD > 0) p.kickCD -= dt;
    if (p.squash > 0) p.squash = Math.max(0, p.squash - dt * 4);
    // smooth facing toward velocity direction
    const sp = Math.hypot(p.vx, p.vy);
    if (sp > 0.3) {
      const target = Math.atan2(p.vy, p.vx);
      let diff = target - p.facing;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      p.facing += diff * 0.25 * ds;
    }
  }
  resolvePlayerCollisions([...teamA, ...teamB]);
  updateReferee(dt);

  // ball
  ball.x += ball.vx * ds;
  ball.y += ball.vy * ds;
  const friction = Math.pow(0.985, ds);
  ball.vx *= friction;
  ball.vy *= friction;
  if (Math.abs(ball.vx) < 0.05) ball.vx = 0;
  if (Math.abs(ball.vy) < 0.05) ball.vy = 0;

  // ball trail
  ballTrail.push({ x: ball.x, y: ball.y, t: 1 });
  if (ballTrail.length > 18) ballTrail.shift();
  for (const tp of ballTrail) tp.t -= dt * 5;

  // possession stat
  const oA = findClosestToBall(teamA), oB = findClosestToBall(teamB);
  if (oA.d < oB.d) possessionA++; else possessionB++;

  // ball-player interaction
  for (const p of [...teamA, ...teamB]) {
    const d = dist(p.x, p.y, ball.x, ball.y);
    // GK save: he reaches a fast incoming ball aimed at his own goal —
    // freeze the ball, trigger a goal-kick set piece instead of letting
    // the normal decideKick scramble out.
    if (p.role === 'GK' && d < 28 && p.kickCD <= 0) {
      const ballSpeed = Math.hypot(ball.vx, ball.vy);
      const dir = p.team.dir;
      const towardOwnGoal = ball.vx * dir < -1.5;
      if (ballSpeed > 5 && towardOwnGoal) {
        triggerSave(p);
        return;
      }
    }
    if (d < 20 && p.kickCD <= 0) {
      decideKick(p);
      p.kickCD = 0.18;
    } else if (d < 14) {
      const dx = ball.x - p.x, dy = ball.y - p.y;
      const dd = Math.hypot(dx, dy) || 1;
      ball.vx += dx / dd * 0.6;
      ball.vy += dy / dd * 0.6;
    }
  }

  // walls + goals
  if (ball.x < FIELD.x + 4) {
    if (ball.y > GOAL_TOP && ball.y < GOAL_BOT) { goalScored(TEAM_B); return; }
    ball.x = FIELD.x + 4; ball.vx = -ball.vx * 0.55;
  }
  if (ball.x > FIELD.x + FIELD.w - 4) {
    if (ball.y > GOAL_TOP && ball.y < GOAL_BOT) { goalScored(TEAM_A); return; }
    ball.x = FIELD.x + FIELD.w - 4; ball.vx = -ball.vx * 0.55;
  }
  if (ball.y < FIELD.y + 4) { ball.y = FIELD.y + 4; ball.vy = -ball.vy * 0.55; }
  if (ball.y > FIELD.y + FIELD.h - 4) { ball.y = FIELD.y + FIELD.h - 4; ball.vy = -ball.vy * 0.55; }

  // particles
  updateParticles(dt);

  // record replay snapshot
  recordSnapshot();

  // toast tick
  if (toast) { toast.t -= dt; if (toast.t <= 0) toast = null; }

  // shake decay
  if (shake.t > 0) shake.t -= dt;
}

function goalScored(team) {
  // hard cooldown — even if celebration state gets lost, no rapid re-scoring
  const now = performance.now();
  if (now - lastGoalAt < 500) {
    // still inside cooldown: just nudge ball back into play to avoid sticking
    ball.x = W/2; ball.y = H/2; ball.vx = 0; ball.vy = 0;
    return;
  }
  lastGoalAt = now;

  if (team === TEAM_A) scoreA++; else scoreB++;
  // immediately move ball out of goal so re-trigger is impossible even if
  // celebration logic somehow gets short-circuited
  ball.x = W/2; ball.y = H/2; ball.vx = 0; ball.vy = 0;

  shakeAdd(20, 0.7);
  spawnConfetti(team === TEAM_A ? FIELD.x + FIELD.w - 60 : FIELD.x + 60, H/2, team.color);
  showToast(T.goal(team.name), team.color, 2.4);
  sfx('cheer');
  celebrating = { team, t: 1.2, replayQueued: true };
}

// === Particles ===
function spawnKickBurst(x, y, dx, dy, count, color) {
  for (let i = 0; i < count; i++) {
    const a = Math.atan2(dy, dx) + rand(-0.6, 0.6);
    const sp = rand(1.5, 4.5);
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: rand(0.2, 0.5), maxLife: 0.5, color, size: rand(1.5, 3), kind: 'spark',
    });
  }
}
function spawnConfetti(x, y, color) {
  const colors = [color, '#ffe44d', '#ffffff', lighten(color, 40)];
  for (let i = 0; i < 90; i++) {
    particles.push({
      x: x + rand(-30, 30), y: y + rand(-30, 30),
      vx: rand(-5, 5), vy: rand(-9, -2),
      life: rand(1.2, 2.5), maxLife: 2.5,
      color: pick(colors), size: rand(2, 4),
      rot: rand(0, Math.PI*2), vrot: rand(-6, 6),
      kind: 'confetti',
    });
  }
}
function updateParticles(dt) {
  const s = dt * 60; // local frame scale (called outside update too)
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * s; p.y += p.vy * s;
    if (p.kind === 'confetti') { p.vy += 0.2 * s; p.vx *= Math.pow(0.99, s); p.rot += p.vrot * dt; }
    if (p.kind === 'spark') { const f = Math.pow(0.92, s); p.vx *= f; p.vy *= f; }
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// === Replay buffer ===
function recordSnapshot() {
  const ps = [];
  for (const p of [...teamA, ...teamB]) {
    ps.push({
      x: p.x, y: p.y,
      vx: p.vx, vy: p.vy,
      facing: p.facing,
      tid: p.team.id,
      role: p.role,
      num: p.num,
      name: p.name,
      phaseOff: p.phaseOff,
    });
  }
  replayBuf.push({ ball: { x: ball.x, y: ball.y }, players: ps });
  if (replayBuf.length > REPLAY_BUF_LEN) replayBuf.shift();
}
function startReplay() {
  if (!REPLAYS_ENABLED) return false;       // disabled — see top-of-file flag
  if (replayBuf.length < 30) return false;
  const len = Math.min(REPLAY_BUF_LEN, replayBuf.length);
  const frames = replayBuf.slice(-len).map(f => ({
    ball: { ...f.ball },
    players: f.players.map(p => ({ ...p })),
  }));
  replay = { frames, idx: 0, slowFactor: 0.45 };
  showToast(T.replayLabel, '#ffe44d', 2.2);
  return true;
}

function endReplay() {
  replay = null;
  const scoredAgainst = celebrating && celebrating.team === TEAM_A ? TEAM_B : TEAM_A;
  kickoffTeam = scoredAgainst;
  resetPositions();
  celebrating = null;
  sfx('whistle');
}

// === Shake ===
function shakeAdd(amp, t) {
  if (amp > shake.amp || t > shake.t) { shake.amp = amp; shake.t = t; shake.tMax = t; }
}

// === Toast ===
function showToast(text, color = '#fff', dur = 2.0) {
  toast = { text, color, t: dur, max: dur };
}

// === Drawing ===
let standsCanvas = null;
function buildStandsCache() {
  standsCanvas = document.createElement('canvas');
  standsCanvas.width = W; standsCanvas.height = H;
  const sx = standsCanvas.getContext('2d');

  // Background concrete
  const grad = sx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1d1d1d');
  grad.addColorStop(1, '#0d0d0d');
  sx.fillStyle = grad; sx.fillRect(0, 0, W, H);

  // Tier rings
  for (let r = 0; r < 4; r++) {
    sx.strokeStyle = `rgba(255,255,255,${0.04 + r * 0.01})`;
    sx.lineWidth = 1;
    sx.strokeRect(FIELD.x - 14 - r*14, FIELD.y - 14 - r*14,
                  FIELD.w + 28 + r*28, FIELD.h + 28 + r*28);
  }

  // Crowd dots
  const colors = ['#e23636','#3578e2','#ffe44d','#9c2dd2','#28a745','#f08c2e','#ffffff','#888'];
  function inFieldArea(x, y) {
    return x > FIELD.x - 6 && x < FIELD.x + FIELD.w + 6
        && y > FIELD.y - 6 && y < FIELD.y + FIELD.h + 6;
  }
  for (let i = 0; i < 4500; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    if (inFieldArea(x, y)) continue;
    sx.fillStyle = pick(colors);
    sx.globalAlpha = rand(0.25, 0.85);
    sx.fillRect(x, y, 2, 2);
  }
  sx.globalAlpha = 1;

  // Front rail along the field
  sx.strokeStyle = 'rgba(255,255,255,0.18)';
  sx.lineWidth = 2;
  sx.strokeRect(FIELD.x - 6, FIELD.y - 6, FIELD.w + 12, FIELD.h + 12);
}

function drawField() {
  // grass stripes
  const stripes = 16;
  const sw = FIELD.w / stripes;
  for (let i = 0; i < stripes; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#0d6b32' : '#0a5d2a';
    ctx.fillRect(FIELD.x + i*sw, FIELD.y, sw, FIELD.h);
  }

  // subtle vignette
  const vg = ctx.createRadialGradient(W/2, H/2, FIELD.w*0.3, W/2, H/2, FIELD.w*0.7);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = vg;
  ctx.fillRect(FIELD.x, FIELD.y, FIELD.w, FIELD.h);

  ctx.strokeStyle = 'rgba(255,255,255,0.88)';
  ctx.lineWidth = 3;
  ctx.strokeRect(FIELD.x, FIELD.y, FIELD.w, FIELD.h);
  ctx.beginPath();
  ctx.moveTo(W/2, FIELD.y); ctx.lineTo(W/2, FIELD.y + FIELD.h);
  ctx.stroke();
  ctx.beginPath(); ctx.arc(W/2, H/2, 80, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.beginPath(); ctx.arc(W/2, H/2, 4, 0, Math.PI*2); ctx.fill();

  const PB_W = 150, PB_H = 290;
  ctx.strokeRect(FIELD.x, H/2 - PB_H/2, PB_W, PB_H);
  ctx.strokeRect(FIELD.x + FIELD.w - PB_W, H/2 - PB_H/2, PB_W, PB_H);
  const GA_W = 60, GA_H = 160;
  ctx.strokeRect(FIELD.x, H/2 - GA_H/2, GA_W, GA_H);
  ctx.strokeRect(FIELD.x + FIELD.w - GA_W, H/2 - GA_H/2, GA_W, GA_H);
  ctx.beginPath(); ctx.arc(FIELD.x + 105, H/2, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(FIELD.x + FIELD.w - 105, H/2, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(FIELD.x + 105, H/2, 60, -0.55, 0.55); ctx.stroke();
  ctx.beginPath(); ctx.arc(FIELD.x + FIELD.w - 105, H/2, 60, Math.PI - 0.55, Math.PI + 0.55); ctx.stroke();
  for (const [cx, cy, sa, ea] of [
    [FIELD.x, FIELD.y, 0, Math.PI/2],
    [FIELD.x + FIELD.w, FIELD.y, Math.PI/2, Math.PI],
    [FIELD.x + FIELD.w, FIELD.y + FIELD.h, Math.PI, 1.5*Math.PI],
    [FIELD.x, FIELD.y + FIELD.h, 1.5*Math.PI, 2*Math.PI],
  ]) { ctx.beginPath(); ctx.arc(cx, cy, 12, sa, ea); ctx.stroke(); }

  drawGoal(FIELD.x - 14, GOAL_TOP, 14, GOAL_H);
  drawGoal(FIELD.x + FIELD.w, GOAL_TOP, 14, GOAL_H);
}

function drawGoal(x, y, w, h) {
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 4; i++) {
    const xi = x + (w * i / 4);
    ctx.beginPath(); ctx.moveTo(xi, y); ctx.lineTo(xi, y + h); ctx.stroke();
  }
  for (let i = 1; i < 8; i++) {
    const yi = y + (h * i / 8);
    ctx.beginPath(); ctx.moveTo(x, yi); ctx.lineTo(x + w, yi); ctx.stroke();
  }
}

function drawBallTrail() {
  for (const tp of ballTrail) {
    if (tp.t <= 0) continue;
    ctx.beginPath();
    ctx.arc(tp.x, tp.y, 6 * tp.t, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${0.18 * tp.t})`;
    ctx.fill();
  }
}

// ===== humanoid sprite =====
// Draws a tiny top-down character: shadow, legs, shorts, torso (jersey),
// swinging arms, head, hair. Sprite is designed facing east (+X) in local
// coords; ctx.rotate(facing) aligns it to movement direction.
function drawHumanoid(x, y, team, num, name, isPossessor, squash, vx, vy, facing, role, phaseOff) {
  const speed = Math.hypot(vx, vy);
  const moving = speed > 0.4;
  const isGK = role === 'GK';

  // ---------- shadow (in world space, not rotated) ----------
  ctx.beginPath();
  ctx.ellipse(x + 1, y + 11, 12, 4.5, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fill();

  ctx.save();
  ctx.translate(x, y);
  // sprite is drawn facing east (+X local). Rotate to face direction.
  ctx.rotate(facing);

  // walk cycle: stride speed scales with movement speed
  const walkSpeed = clamp(speed / 2.0, 0, 1.6);
  const phase = totalTime * 14 * walkSpeed + phaseOff;
  const stride = moving ? Math.sin(phase) * 4.5 : 0;
  const armSwing = moving ? Math.sin(phase) * 3.3 : 0;
  const bob = moving ? Math.abs(Math.sin(phase * 2)) * 0.8 : 0;

  // ---------- legs (drawn before torso so torso overlaps) ----------
  // local coords: facing east, "front" of body = +X. legs straddle the Y axis.
  ctx.fillStyle = '#15151a';
  drawRoundRect(-3, -6 + stride, 4, 11, 1.5);  // top leg (in screen, when facing east)
  drawRoundRect(-3,  1 - stride, 4, 11, 1.5);  // bottom leg

  // socks (lighter band at end of leg)
  ctx.fillStyle = '#fff';
  ctx.fillRect(-2, 4 + stride, 2, 1.5);
  ctx.fillRect(-2, 11 - stride, 2, 1.5);

  // shorts (white block over hips)
  ctx.fillStyle = '#f0f0f0';
  drawRoundRect(-4, -4, 6, 8, 1.5);

  // shirt color: GK uses team.gkColor when defined (FIFA Law 4)
  const shirtColor = (isGK && team.gkColor) ? team.gkColor : team.color;

  // ---------- arms (swing opposite to legs) ----------
  ctx.fillStyle = lighten(shirtColor, -22);
  if (isGK) {
    drawRoundRect(0, -9, 4, 2.5, 1);
    drawRoundRect(0,  6, 4, 2.5, 1);
  } else {
    drawRoundRect(0, -8 + armSwing, 4, 3, 1);
    drawRoundRect(0,  5 - armSwing, 4, 3, 1);
  }
  // hands / GK gloves
  if (isGK) {
    ctx.fillStyle = '#ffe44d';            // bright glove yellow
    drawRoundRect(3, -10, 3.5, 3, 1);
    drawRoundRect(3,   7, 3.5, 3, 1);
  } else {
    ctx.fillStyle = '#e8b88a';
    ctx.fillRect(3.5, -7 + armSwing, 1.5, 1.5);
    ctx.fillRect(3.5,  6 - armSwing, 1.5, 1.5);
  }

  // ---------- torso (jersey) ----------
  const sx = 1 + squash * 0.18;
  const sy = 1 - squash * 0.10;
  ctx.save();
  ctx.scale(sx, sy);
  ctx.translate(0, -bob);

  const grad = ctx.createRadialGradient(-1, -1, 1, 0, 0, 9);
  grad.addColorStop(0, lighten(shirtColor, 30));
  grad.addColorStop(1, shirtColor);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(0, 0, 7, 8, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // jersey number — counter-rotate so it stays readable in screen space
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 9px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.save();
  ctx.rotate(-facing);
  ctx.fillText(String(num), 0, 0);
  ctx.restore();

  // ---------- head ----------
  ctx.beginPath();
  ctx.arc(5, 0, 4, 0, Math.PI*2);
  ctx.fillStyle = '#e8b88a';
  ctx.fill();
  ctx.strokeStyle = '#3a2820';
  ctx.lineWidth = 0.7;
  ctx.stroke();

  // hair cap on back of head
  ctx.beginPath();
  ctx.arc(5, 0, 4, Math.PI*0.55, Math.PI*1.45);
  ctx.lineTo(3.2, 0);
  ctx.closePath();
  ctx.fillStyle = '#2a1f15';
  ctx.fill();

  ctx.restore(); // squash + bob

  // ---------- possessor halo ----------
  if (isPossessor) {
    const pulse = 0.6 + Math.sin(totalTime * 6) * 0.4;
    ctx.beginPath();
    ctx.arc(0, 0, 14, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(255,228,77,${pulse})`;
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }

  ctx.restore(); // translate + rotate

  // ---------- name floating (kept upright in screen space) ----------
  if (isPossessor && name) {
    ctx.font = 'bold 11px system-ui';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const tw = ctx.measureText(name).width + 12;
    ctx.fillStyle = 'rgba(0,0,0,0.78)';
    roundRect(x - tw/2, y - 28, tw, 16, 8); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillText(name, x, y - 20);
  }
}

function drawBallAt(x, y) {
  ctx.beginPath(); ctx.arc(x + 1, y + 3, 8, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fill();
  const grad = ctx.createRadialGradient(x - 2, y - 2, 1, x, y, 8);
  grad.addColorStop(0, '#fff'); grad.addColorStop(1, '#cdcdcd');
  ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI*2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = '#222'; ctx.lineWidth = 1; ctx.stroke();
  ctx.beginPath(); ctx.arc(x, y, 2.4, 0, Math.PI*2);
  ctx.fillStyle = '#222'; ctx.fill();
}

// === Referee ===
function updateReferee(dt) {
  // Follow the ball at a respectful distance, on the opposite side from
  // the play so the ref doesn't end up in shots. Clamp inside the field.
  const off = ball.y > H/2 ? -55 : 55; // sit on the half opposite to ball-y
  const tx = clamp(ball.x + 30, FIELD.x + 30, FIELD.x + FIELD.w - 30);
  const ty = clamp(H/2 + off, FIELD.y + 30, FIELD.y + FIELD.h - 30);
  const dx = tx - referee.x, dy = ty - referee.y;
  const d = Math.hypot(dx, dy) || 1;
  const refSpeed = 1.7;
  if (d > 5) {
    referee.vx = dx / d * refSpeed;
    referee.vy = dy / d * refSpeed;
  } else {
    referee.vx *= 0.6; referee.vy *= 0.6;
  }
  referee.x += referee.vx * ds;
  referee.y += referee.vy * ds;
  // The referee always watches the ball (shuffles sideways like a real one)
  const bx = ball.x - referee.x, by = ball.y - referee.y;
  if (Math.hypot(bx, by) > 0.5) {
    const t = Math.atan2(by, bx);
    let diff = t - referee.facing;
    while (diff > Math.PI) diff -= Math.PI*2;
    while (diff < -Math.PI) diff += Math.PI*2;
    referee.facing += diff * 0.3 * ds;
  }
  if (referee.alarm > 0) referee.alarm = Math.max(0, referee.alarm - dt);
}

function drawReferee() {
  // body — use the humanoid renderer with a black/gray "kit"
  drawHumanoid(referee.x, referee.y, REF_TEAM, '', null, false, 0,
               referee.vx, referee.vy, referee.facing, 'REF', referee.phaseOff);
  // alarm: little yellow flag/whistle indicator above the ref's head
  if (referee.alarm > 0) {
    const a = clamp(referee.alarm, 0, 1);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = '#ffe44d';
    drawRoundRect(referee.x - 6, referee.y - 28, 12, 10, 1.5);
    ctx.fillStyle = '#1a1a1a';
    ctx.font = 'bold 9px system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('!', referee.x, referee.y - 23);
    ctx.restore();
  }
}

function drawWhistleHint() {
  // marker on the foul / penalty spot
  const a = clamp(whistle.t, 0, 1);
  ctx.save();
  ctx.globalAlpha = 0.7 * a;
  ctx.strokeStyle = '#ffe44d';
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 4]);
  ctx.beginPath();
  ctx.arc(whistle.x, whistle.y, 18, 0, Math.PI*2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    const a = clamp(p.life / p.maxLife, 0, 1);
    if (p.kind === 'confetti') {
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size, -p.size*0.5, p.size*2, p.size);
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * a, 0, Math.PI*2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = a;
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

function drawHUD() {
  // top center scoreboard
  const bw = 360, bh = 76, bx = W/2 - bw/2, by = 12;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  roundRect(bx, by, bw, bh, 12); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1; ctx.stroke();

  // team blocks
  ctx.fillStyle = TEAM_A.color;
  roundRect(bx + 8, by + 8, 88, bh - 16, 8); ctx.fill();
  ctx.fillStyle = TEAM_B.color;
  roundRect(bx + bw - 96, by + 8, 88, bh - 16, 8); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold 18px system-ui';
  ctx.fillText(TEAM_A.short, bx + 52, by + 38);
  ctx.fillText(TEAM_B.short, bx + bw - 52, by + 38);

  ctx.font = 'bold 36px system-ui';
  ctx.fillStyle = '#fff';
  ctx.fillText(`${scoreA}  :  ${scoreB}`, W/2, by + 32);

  const m = Math.floor(timeLeft / 60);
  const s = Math.floor(timeLeft % 60);
  ctx.font = '14px system-ui';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillText(`${m}:${String(s).padStart(2,'0')}`, W/2, by + 60);

  // stat bar — possession + shots
  drawStatsBar();

  // speed indicator (hidden at the default pace)
  if (Math.abs(speedMul - SPEED_DEFAULT) > 1e-4) {
    ctx.font = '12px system-ui';
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.textAlign = 'right';
    ctx.fillText(`${speedMul.toFixed(2)}×`, W - 20, 28);
  }
  if (muted) {
    ctx.font = '12px system-ui';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.textAlign = 'left';
    ctx.fillText('🔇', 20, 28);
  }
}

function drawStatsBar() {
  const total = possessionA + possessionB || 1;
  const ratioA = possessionA / total;
  const bw = 360, bx = W/2 - bw/2, by = 96, bh = 8;

  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  roundRect(bx, by, bw, bh, 4); ctx.fill();
  ctx.fillStyle = TEAM_A.color;
  roundRect(bx, by, bw * ratioA, bh, 4); ctx.fill();
  ctx.fillStyle = TEAM_B.color;
  roundRect(bx + bw * ratioA, by, bw * (1 - ratioA), bh, 4); ctx.fill();

  ctx.font = '11px system-ui';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(T.possLeft((ratioA*100).toFixed(0)), bx, by + bh + 12);
  ctx.textAlign = 'right';
  ctx.fillText(T.possRight(((1-ratioA)*100).toFixed(0)), bx + bw, by + bh + 12);

  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText(T.shots(shotsA, shotsB), W/2, by + bh + 12);
}

function drawToast() {
  if (!toast) return;
  const m = toast.max || 2;
  const fade = toast.t > m - 0.2 ? (m - toast.t) / 0.2
             : toast.t < 0.4 ? toast.t / 0.4 : 1;
  const a = clamp(fade, 0, 1);
  ctx.save();
  ctx.globalAlpha = a;
  ctx.font = 'bold 28px system-ui';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const w = ctx.measureText(toast.text).width + 60;
  const x = W/2 - w/2, y = 138, h = 44;
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  roundRect(x, y, w, h, 22); ctx.fill();
  ctx.strokeStyle = toast.color; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = toast.color;
  ctx.fillText(toast.text, W/2, y + h/2 + 1);
  ctx.restore();
}

function drawReplayOverlay() {
  // scanlines & label
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = '#000';
  for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);
  ctx.restore();

  // top-left REC dot
  const t = (Date.now() / 400) % 1;
  ctx.beginPath(); ctx.arc(40, H - 36, 8, 0, Math.PI*2);
  ctx.fillStyle = `rgba(226,54,54,${0.4 + t*0.6})`; ctx.fill();
  ctx.font = 'bold 14px system-ui';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(T.replayOverlay, 56, H - 36);
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
function drawRoundRect(x, y, w, h, r) {
  // path + fill in one go (uses currently set fillStyle)
  const rr = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.lineTo(x + w - rr, y); ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
  ctx.lineTo(x + w, y + h - rr); ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
  ctx.lineTo(x + rr, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
  ctx.lineTo(x, y + rr); ctx.quadraticCurveTo(x, y, x + rr, y);
  ctx.closePath();
  ctx.fill();
}

// === Main draw ===
function draw() {
  ctx.save();

  // shake
  if (shake.t > 0) {
    const k = shake.t / (shake.tMax || 1);
    const ox = (Math.random() - 0.5) * shake.amp * k * 2;
    const oy = (Math.random() - 0.5) * shake.amp * k * 2;
    ctx.translate(ox, oy);
  }

  // stands (cached)
  if (standsCanvas) ctx.drawImage(standsCanvas, 0, 0);

  drawField();

  if (replay) {
    const f = replay.frames[Math.floor(replay.idx)];
    drawBallTrail();
    for (const ps of f.players) {
      const team = ps.tid === 'A' ? TEAM_A : TEAM_B;
      drawHumanoid(ps.x, ps.y, team, ps.num, null, false, 0,
                   ps.vx || 0, ps.vy || 0, ps.facing || 0, ps.role, ps.phaseOff || 0);
    }
    drawBallAt(f.ball.x, f.ball.y);
    drawParticles();
    drawHUD();
    drawReplayOverlay();
  } else {
    drawBallTrail();
    const oA = findClosestToBall(teamA), oB = findClosestToBall(teamB);
    const possessor = oA.d < oB.d ? oA.p : oB.p;
    for (const p of [...teamA, ...teamB]) {
      drawHumanoid(p.x, p.y, p.team, p.num, p.name, p === possessor, p.squash,
                   p.vx, p.vy, p.facing, p.role, p.phaseOff);
    }
    drawReferee();
    drawBallAt(ball.x, ball.y);
    drawParticles();
    drawHUD();
    if (celebrating) drawGoalFlash();
    if (whistle) drawWhistleHint();
    if (paused) drawPaused();
  }

  drawToast();
  ctx.restore();
}

function drawGoalFlash() {
  const a = clamp(celebrating.t / 1.2, 0, 1);
  ctx.fillStyle = `rgba(255,255,255,${0.18 * a})`;
  ctx.fillRect(0, 0, W, H);
}

function drawPaused() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 64px system-ui';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(timeLeft <= 0 ? T.fulltime : T.paused, W/2, H/2);
}

// === Loop ===
function loop() {
  try {
    const dt = 1/60;
    // walk-cycle clock advances always so animations don't freeze on celebration/replay
    if (replay || celebrating) totalTime += dt * 0.5;

    if (replay) {
      replay.idx += replay.slowFactor;
      if (replay.idx >= replay.frames.length) {
        endReplay();
      }
    } else if (celebrating) {
      celebrating.t -= dt;
      updateParticles(dt);
      if (toast) { toast.t -= dt; if (toast.t <= 0) toast = null; }
      if (shake.t > 0) shake.t -= dt;
      if (celebrating.replayQueued && celebrating.t <= 0.4) {
        celebrating.replayQueued = false;
        if (!startReplay()) {
          // replay buffer too small — just resume
          endReplay();
        }
      }
      // safety: if celebration drags on without replay starting, recover
      if (celebrating && celebrating.t <= -1 && !replay) {
        endReplay();
      }
    } else if (whistle) {
      // referee blew the whistle — pause the world while the ball is
      // repositioned for a free kick / penalty
      whistle.t -= dt;
      if (toast) { toast.t -= dt; if (toast.t <= 0) toast = null; }
      if (shake.t > 0) shake.t -= dt;
      if (referee.alarm > 0) referee.alarm -= dt;
      if (whistle.t <= 0) executeSetPiece();
    } else if (!paused && timeLeft > 0) {
      // Advance the world by `speedMul` frames worth of game-time per real
      // frame. Sub-step when speedMul > 1 so each step is at most a full
      // frame (avoids tunneling). With this setup `update()` truly runs in
      // slow-motion at speedMul < 1 because all physics is scaled by ds.
      const steps = Math.max(1, Math.ceil(speedMul));
      const stepDt = (speedMul / steps) * dt;
      for (let i = 0; i < steps; i++) {
        update(stepDt);
        timeLeft -= stepDt;
        if (celebrating || whistle || timeLeft <= 0) {
          if (timeLeft <= 0) { timeLeft = 0; sfx('whistle'); }
          break;
        }
      }
    }
    draw();
  } catch (err) {
    console.error('loop error:', err);
  } finally {
    requestAnimationFrame(loop);
  }
}

document.addEventListener('keydown', (e) => {
  ensureAudio();
  if (e.key === ' ') {
    if (replay || celebrating) { endReplay(); }
    else paused = !paused;
    e.preventDefault();
  }
  else if (e.key === 'r' || e.key === 'R') { reset(); }
  else if (e.key === '+' || e.key === '=') { speedMul = clamp(speedMul * 1.5, 0.1, 4); }
  else if (e.key === '-' || e.key === '_') { speedMul = clamp(speedMul / 1.5, 0.1, 4); }
  else if (e.key === 'm' || e.key === 'M') { setMuted(!muted); }
  else if (e.key === 'p' || e.key === 'P') { if (!replay) startReplay(); }
});
document.addEventListener('click', ensureAudio);
cv.addEventListener('click', () => {
  if (replay || celebrating) endReplay();
});
document.addEventListener('visibilitychange', () => {
  // browser throttles rAF on hidden tabs; nothing to do, but reset shake on return
  if (!document.hidden && shake.t < 0) shake.t = 0;
});

reset();
loop();
</script>
</body>
